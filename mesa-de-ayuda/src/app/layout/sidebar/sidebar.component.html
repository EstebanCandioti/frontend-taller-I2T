<aside class="sidebar" [class.collapsed]="collapsed()">
  <div class="sidebar-header">
    @if (!collapsed()) {
      <span class="sidebar-title">Mesa de Ayuda IT</span>
    }
    <button class="toggle-btn" (click)="toggleCollapse()" [attr.aria-label]="collapsed() ? 'Expandir menú' : 'Colapsar menú'">
      <span class="material-icon">{{ collapsed() ? 'chevron_right' : 'chevron_left' }}</span>
    </button>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      @if (isVisible(item, (currentRole$ | async) ?? null)) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [attr.title]="collapsed() ? item.label : null"
        >
          <span class="material-icon">{{ item.icon }}</span>
          @if (!collapsed()) {
            <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      }
    }
  </nav>
</aside>
