server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redirigir todas las rutas al index.html para Angular Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend para evitar CORS en producción
    location ^~ /api/ {
        proxy_pass http://mesa_ayuda_backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy para WebSocket (SockJS usa subrutas como /ws/info, /ws/xxx/xxx/websocket)
    location ^~ /ws {
        proxy_pass http://mesa_ayuda_backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss: http: https:" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}